<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>갈등대처유형 자가진단</title>
<style>
  :root { --navy:#282b3b; --blue:#3f5f9a; --red:#d51f26; --gray:#f4f5f8; --line:#d9dce5; }
  * { box-sizing:border-box; }
  body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",Arial,sans-serif; color:#202124; background:#f7f8fb; }
  header { background:white; border-bottom:1px solid var(--line); padding:18px 16px 12px; position:sticky; top:0; z-index:5; box-shadow:0 2px 8px rgba(0,0,0,.04); }
  .wrap { max-width:1080px; margin:0 auto; }
  h1 { margin:0 0 6px; font-size:26px; color:var(--red); letter-spacing:-.03em; }
  .subtitle { margin:0; font-size:15px; line-height:1.45; color:#444; }
  .scale { display:flex; gap:6px; flex-wrap:wrap; margin-top:12px; font-size:13px; }
  .scale span { background:#eef1f8; border:1px solid #d7dbea; border-radius:999px; padding:6px 9px; font-weight:700; }
  main { padding:18px 16px 48px; }
  .grid { display:grid; grid-template-columns:1fr 330px; gap:18px; align-items:start; }
  .card { background:white; border:1px solid var(--line); border-radius:18px; padding:18px; box-shadow:0 8px 24px rgba(30,35,60,.06); }
  .diagram { width:100%; border-radius:12px; border:1px solid var(--line); background:#f8fafc; }
  .side h2 { margin:0 0 10px; font-size:18px; }
  .legend { font-size:14px; line-height:1.6; color:#555; }
  .q { padding:16px 0; border-bottom:1px solid #eceef5; }
  .q:last-child { border-bottom:0; }
  .q-title { font-size:16px; font-weight:800; line-height:1.45; margin-bottom:12px; }
  .options { display:grid; grid-template-columns:repeat(5,1fr); gap:8px; }
  label.opt { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:62px; border:1px solid #d8dbe6; border-radius:12px; cursor:pointer; background:#fff; user-select:none; }
  label.opt:has(input:checked) { border-color:var(--blue); background:#eef3ff; box-shadow:0 0 0 2px rgba(63,95,154,.15) inset; }
  input[type=radio] { transform:scale(1.15); margin:0 0 5px; }
  .num { font-weight:900; font-size:17px; }
  .txt { font-size:11px; color:#555; margin-top:2px; text-align:center; line-height:1.2; }
  .actions { display:flex; gap:10px; flex-wrap:wrap; margin-top:18px; }
  button { border:0; border-radius:12px; padding:13px 16px; font-weight:900; font-size:15px; cursor:pointer; }
  .primary { background:var(--navy); color:#fff; }
  .secondary { background:#e8ebf4; color:#222; }
  .notice { margin-top:12px; color:#d51f26; font-weight:800; min-height:22px; }
  #result { display:none; margin-top:18px; }
  table { width:100%; border-collapse:collapse; overflow:hidden; border-radius:14px; font-size:15px; }
  th { background:var(--navy); color:white; padding:12px 8px; }
  td { border:1px solid #e1e3eb; padding:11px 8px; text-align:center; background:white; }
  tr.top td { background:#fff4e8; font-weight:900; }
  tr.low td { background:#eef6ff; font-weight:900; }
  .result-title { font-size:22px; margin:0 0 10px; color:#111; }
  .summary { padding:12px 14px; background:#f4f6fb; border-radius:12px; line-height:1.6; margin:10px 0 14px; }
  .answer-table td:nth-child(2) { text-align:left; }
  footer { color:#777; font-size:12px; text-align:center; padding-top:18px; }
  @media (max-width:860px) {
    .grid { grid-template-columns:1fr; }
    .side { order:-1; }
    header { padding-top:14px; }
    h1 { font-size:22px; }
    .options { grid-template-columns:repeat(5, minmax(52px,1fr)); gap:5px; }
    label.opt { min-height:58px; padding:4px 2px; }
    .txt { font-size:10px; }
    .card { padding:14px; border-radius:14px; }
    .q-title { font-size:15px; }
  }
</style>
</head>
<body>
<header>
  <div class="wrap">
    <h1>나의 갈등대처유형은?</h1>
    <p class="subtitle">각 문항을 읽고 갈등상황에서 자신이 친구들 혹은 동료들과의 관계에서 얼마나 그런 행동을 나타내는지 응답해 주세요.</p>
    <div class="scale" aria-label="5점 척도 안내">
      <span>1 전혀 그렇지 않다</span><span>2 그렇지 않은 편이다</span><span>3 보통이다</span><span>4 그런 편이다</span><span>5 항상 그런 편이다</span>
    </div>
  </div>
</header>
<main class="wrap">
  <div class="grid">
    <section class="card">
      <form id="quiz"></form>
      <div class="actions">
        <button type="button" class="primary" onclick="calculate()">결과 보기</button>
        <button type="button" class="secondary" onclick="resetAll()">다시 하기</button>
      </div>
      <div id="notice" class="notice"></div>
      <section id="result" aria-live="polite">
        <h2 class="result-title">자가진단 결과</h2>
        <div id="summary" class="summary"></div>
        <div id="scoreTable"></div>
        <h3>문항별 응답</h3>
        <div id="answerTable"></div>
      </section>
    </section>

<script>
const questions = ["나는 동료들에게 내 주장이 옳다는 것을 강력히 반박한다.", "나는 타협점에 도달하기 위하여 다른 사람들과 협상한다.", "나는 다른 사람들의 기대를 충족시키기 위하여 노력한다.", "나는 문제의 원인을 발견 후 상대방과 서로에게 유리한 해결책을 찾기 위해 노력한다.", "나는 내 입장을 관철하는데 확고하다.", "나는 될 수 있는 대로 문제가 될 사안에 대해서 관여하지 않으려고 한다.", "나는 내가 정한 문제해결방식을 고수한다.", "나는 상대방에게 줄 것은 주고 받을 것은 받음으로써 타협점을 모색하려고 한다.", "나는 상대방과 문제를 함께 해결하기 위하여 정확한 정보를 교환하려고 노력한다.", "나는 의견차이에 대하여 터놓고 말하는 것을 피한다.", "나는 다른 사람들의 의견을 다 들어준다.", "나는 문제를 확 터놓고 토의하려고 노력한다.", "나는 문제를 끝내기 위해 중도노선을 제안한다.", "나는 상대방의 제안을 수용하는 편이다.", "나는 서로 감정 상하는 것을 피하기 위하여 동료들과 의견차가 있더라도 나타내지 않는다."];
const scaleText = {1:'전혀 그렇지 않다',2:'그렇지 않은 편이다',3:'보통이다',4:'그런 편이다',5:'항상 그런 편이다'};
const groups = {
  '협력': [4,9,12],
  '수용': [3,11,14],
  '경쟁': [1,5,7],
  '회피': [6,10,15],
  '타협': [2,8,13]
};
const quiz = document.getElementById('quiz');
questions.forEach((q, i) => {
  const n = i + 1;
  const div = document.createElement('div');
  div.className = 'q';
  div.innerHTML = `<div class="q-title">${n}. ${q}</div><div class="options">${[1,2,3,4,5].map(v => `<label class="opt"><input type="radio" name="q${n}" value="${v}"><span class="num">${v}</span><span class="txt">${scaleText[v]}</span></label>`).join('')}</div>`;
  quiz.appendChild(div);
});
function calculate() {
  const answers = {};
  for (let i=1; i<=15; i++) {
    const checked = document.querySelector(`input[name="q${i}"]:checked`);
    if (!checked) {
      document.getElementById('notice').textContent = `${i}번 문항에 응답해 주세요.`;
      document.querySelector(`input[name="q${i}"]`).closest('.q').scrollIntoView({behavior:'smooth', block:'center'});
      return;
    }
    answers[i] = Number(checked.value);
  }
  document.getElementById('notice').textContent = '';
  const scores = Object.entries(groups).map(([type, nums]) => {
    const detail = nums.map(n => `${n}번=${answers[n]}`).join(', ');
    const total = nums.reduce((sum,n)=>sum+answers[n],0);
    return {type, nums:nums.join(', '), detail, total};
  }).sort((a,b)=>b.total-a.total);
  const max = Math.max(...scores.map(s=>s.total));
  const min = Math.min(...scores.map(s=>s.total));
  const topTypes = scores.filter(s=>s.total===max).map(s=>s.type).join(', ');
  const lowTypes = scores.filter(s=>s.total===min).map(s=>s.type).join(', ');
  document.getElementById('summary').innerHTML = `가장 점수가 높은 유형은 <b>${topTypes}</b>(${max}점), 가장 점수가 낮은 유형은 <b>${lowTypes}</b>(${min}점)입니다.`;
  document.getElementById('scoreTable').innerHTML = `<table><thead><tr><th>유형</th><th>해당 문항</th><th>문항별 점수</th><th>합계</th></tr></thead><tbody>${scores.map(s=>`<tr class="${s.total===max?'top':s.total===min?'low':''}"><td><b>${s.type}</b></td><td>${s.nums}</td><td>${s.detail}</td><td><b>${s.total}</b></td></tr>`).join('')}</tbody></table>`;
  document.getElementById('answerTable').innerHTML = `<table class="answer-table"><thead><tr><th>문항</th><th>문항 내용</th><th>응답</th></tr></thead><tbody>${questions.map((q,i)=>`<tr><td>${i+1}</td><td>${q}</td><td><b>${answers[i+1]}</b> · ${scaleText[answers[i+1]]}</td></tr>`).join('')}</tbody></table>`;
  document.getElementById('result').style.display='block';
  document.getElementById('result').scrollIntoView({behavior:'smooth', block:'start'});
}
function resetAll() {
  document.querySelectorAll('input[type=radio]').forEach(r=>r.checked=false);
  document.getElementById('result').style.display='none';
  document.getElementById('notice').textContent='';
  window.scrollTo({top:0, behavior:'smooth'});
}
</script>
</body>
</html>
